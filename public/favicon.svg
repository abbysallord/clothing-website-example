<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <rect width="100" height="100" fill="#080808"/>

  <!-- Outer frame — thin gold border -->
  <rect x="4" y="4" width="92" height="92" fill="none" stroke="#c9a96e" stroke-width="0.8"/>

  <!-- Corner accents — top-left -->
  <line x1="4" y1="16" x2="4" y2="4" stroke="#c9a96e" stroke-width="2"/>
  <line x1="4" y1="4" x2="16" y2="4" stroke="#c9a96e" stroke-width="2"/>
  <!-- top-right -->
  <line x1="84" y1="4" x2="96" y2="4" stroke="#c9a96e" stroke-width="2"/>
  <line x1="96" y1="4" x2="96" y2="16" stroke="#c9a96e" stroke-width="2"/>
  <!-- bottom-left -->
  <line x1="4" y1="84" x2="4" y2="96" stroke="#c9a96e" stroke-width="2"/>
  <line x1="4" y1="96" x2="16" y2="96" stroke="#c9a96e" stroke-width="2"/>
  <!-- bottom-right -->
  <line x1="84" y1="96" x2="96" y2="96" stroke="#c9a96e" stroke-width="2"/>
  <line x1="96" y1="84" x2="96" y2="96" stroke="#c9a96e" stroke-width="2"/>

  <!-- The V form — sharp strokes -->
  <path d="M21 26 L50 75 L79 26" fill="none" stroke="#c9a96e" stroke-width="4.5" stroke-linecap="butt" stroke-linejoin="miter"/>

  <!-- Horizontal strike through V — the Ø element -->
  <line x1="22.5" y1="48.5" x2="77.5" y2="48.5" stroke="#c9a96e" stroke-width="1.8"/>

  <!-- Tiny serif serifs at tops of V -->
  <line x1="17" y1="26" x2="25" y2="26" stroke="#c9a96e" stroke-width="2"/>
  <line x1="75" y1="26" x2="83" y2="26" stroke="#c9a96e" stroke-width="2"/>
</svg>
