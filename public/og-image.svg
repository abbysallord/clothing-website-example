<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Noise texture for depth -->
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" seed="5" result="noiseOut"/>
      <feColorMatrix type="saturate" values="0" in="noiseOut" result="noiseGray"/>
      <feBlend in="SourceGraphic" in2="noiseGray" mode="overlay" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Radial glow behind title -->
    <radialGradient id="centerGlow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>

    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#080808" stop-opacity="0"/>
      <stop offset="100%" stop-color="#020202" stop-opacity="0.75"/>
    </radialGradient>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="#080808"/>

  <!-- Center glow -->
  <rect width="1200" height="630" fill="url(#centerGlow)"/>

  <!-- Noise overlay -->
  <rect width="1200" height="630" fill="#888" filter="url(#noise)" opacity="0.04"/>

  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#vignette)"/>


  <!-- ── Outer border frame ── -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#c9a96e" stroke-width="0.6" opacity="0.5"/>

  <!-- Corner ornaments — top-left -->
  <line x1="40" y1="72" x2="40" y2="40" stroke="#c9a96e" stroke-width="2"/>
  <line x1="40" y1="40" x2="72" y2="40" stroke="#c9a96e" stroke-width="2"/>
  <!-- top-right -->
  <line x1="1128" y1="40" x2="1160" y2="40" stroke="#c9a96e" stroke-width="2"/>
  <line x1="1160" y1="40" x2="1160" y2="72" stroke="#c9a96e" stroke-width="2"/>
  <!-- bottom-left -->
  <line x1="40" y1="558" x2="40" y2="590" stroke="#c9a96e" stroke-width="2"/>
  <line x1="40" y1="590" x2="72" y2="590" stroke="#c9a96e" stroke-width="2"/>
  <!-- bottom-right -->
  <line x1="1128" y1="590" x2="1160" y2="590" stroke="#c9a96e" stroke-width="2"/>
  <line x1="1160" y1="558" x2="1160" y2="590" stroke="#c9a96e" stroke-width="2"/>


  <!-- ── SS25 label ── -->
  <text x="600" y="148"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="13"
        font-weight="400"
        fill="#c9a96e"
        letter-spacing="7"
        opacity="0.8">SS25 COLLECTION</text>

  <!-- Divider line above title -->
  <line x1="480" y1="168" x2="720" y2="168" stroke="#c9a96e" stroke-width="0.7" opacity="0.6"/>


  <!-- ── Main title: VØID ── -->
  <!-- Shadow/depth layer -->
  <text x="602" y="370"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="216"
        font-weight="700"
        fill="#c9a96e"
        opacity="0.06"
        letter-spacing="28">VØID</text>

  <!-- Main cream title -->
  <text x="600" y="367"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="216"
        font-weight="700"
        fill="#f0ebe0"
        letter-spacing="28">VØID</text>

  <!-- Gold stroke overlay for luxury feel -->
  <text x="600" y="367"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="216"
        font-weight="700"
        fill="none"
        stroke="#c9a96e"
        stroke-width="0.5"
        opacity="0.35"
        letter-spacing="28">VØID</text>


  <!-- Divider line below title -->
  <line x1="420" y1="405" x2="780" y2="405" stroke="#c9a96e" stroke-width="0.7" opacity="0.6"/>

  <!-- Dot ornament center -->
  <circle cx="600" cy="405" r="2.5" fill="#c9a96e" opacity="0.7"/>


  <!-- ── Tagline ── -->
  <text x="600" y="450"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="20"
        font-weight="400"
        font-style="italic"
        fill="#c9a96e"
        letter-spacing="6"
        opacity="0.9">Wear The Silence</text>


  <!-- ── Bottom — domain / brand mark ── -->
  <!-- Left micro-text -->
  <text x="80" y="574"
        font-family="'Courier New', Courier, monospace"
        font-size="10"
        fill="#c9a96e"
        letter-spacing="3"
        opacity="0.45">DARK LUXURY EDITORIAL</text>

  <!-- Right micro-text -->
  <text x="1120" y="574"
        text-anchor="end"
        font-family="'Courier New', Courier, monospace"
        font-size="10"
        fill="#c9a96e"
        letter-spacing="3"
        opacity="0.45">VOID-BRAND.COM</text>

  <!-- Center bottom line -->
  <line x1="540" y1="558" x2="660" y2="558" stroke="#c9a96e" stroke-width="0.5" opacity="0.35"/>

  <!-- Subtle vertical side accents -->
  <line x1="40" y1="260" x2="40" y2="370" stroke="#c9a96e" stroke-width="0.5" opacity="0.15"/>
  <line x1="1160" y1="260" x2="1160" y2="370" stroke="#c9a96e" stroke-width="0.5" opacity="0.15"/>
</svg>
